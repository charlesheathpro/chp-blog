[build]
  command = "npm install"
  publish = "."

# ── Edge Functions ───────────────────────────────────────
[[edge_functions]]
  path     = "/post/*"
  function = "post-seo"

[[edge_functions]]
  path     = "/topic/*"
  function = "topic-seo"

[build.environment]
  NODE_VERSION = "18"

[functions]
  directory = "netlify/functions"

[functions."generate-images"]
  schedule = "@hourly"

[functions."scan-backlinks"]
  schedule = "@daily"

[functions."inject-related"]
  schedule = "@hourly"

# ── API routes → Netlify Functions ──────────────────────
[[redirects]]
  from   = "/api/feed"
  to     = "/.netlify/functions/feed"
  status = 200
  force  = true

[[redirects]]
  from   = "/api/post"
  to     = "/.netlify/functions/post"
  status = 200
  force  = true

[[redirects]]
  from   = "/api/post-image"
  to     = "/.netlify/functions/post-image"
  status = 200
  force  = true

[[redirects]]
  from   = "/api/related"
  to     = "/.netlify/functions/related"
  status = 200
  force  = true

[[redirects]]
  from   = "/api/photo-credit"
  to     = "/.netlify/functions/photo-credit"
  status = 200
  force  = true

[[redirects]]
  from   = "/sitemap.xml"
  to     = "/.netlify/functions/sitemap"
  status = 200
  force  = true

# ── Topic pillar pages → topic/index.html ───────────────
[[redirects]]
  from   = "/topic/*"
  to     = "/topic/index.html"
  status = 200

# ── Article index ───────────────────────────────────────
[[redirects]]
  from   = "/articles/"
  to     = "/articles/index.html"
  status = 200

# ── Slug corrections (301 permanent) ────────────────────
[[redirects]]
  from   = "/post/blog-post_03/"
  to     = "/post/mortgage-protection-insurance-in-lakewood-colorado/"
  status = 301
  force  = true

# ── RSS feed → Blogger native feed ──────────────────────
[[redirects]]
  from   = "/feed.xml"
  to     = "https://cohomeprotection.blogspot.com/feeds/posts/default?alt=rss"
  status = 301

# ── Legacy ?slug= URLs → clean path (301 permanent) ─────
[[redirects]]
  from   = "/post/"
  to     = "/post/:slug/"
  status = 301
  query  = {slug = ":slug"}
  force  = true

# ── Clean post URLs → post/index.html ────────────────────
[[redirects]]
  from   = "/post/*"
  to     = "/post/index.html"
  status = 200

# ── Security headers ─────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"

# ── HTML: always revalidate (content changes with new posts) ──
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# ── Static assets: long cache ────────────────────────────
[[headers]]
  for = "/favicon.svg"
  [headers.values]
    Cache-Control = "public, max-age=604800"

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/og-image.svg"
  [headers.values]
    Cache-Control = "public, max-age=604800"
    Content-Type  = "image/svg+xml"
