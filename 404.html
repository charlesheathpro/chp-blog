<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found | Colorado Home Protection</title>
  <meta name="robots" content="noindex, follow">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy:      #1a3256;
      --navy-dark: #0f1e38;
      --gold:      #c49a2e;
      --text-dark: #1e293b;
      --text-mid:  #475569;
      --bg:        #f8fafc;
    }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text-dark);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .nav {
      background: var(--navy-dark);
      padding: 0 24px;
      height: 68px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }
    .logo-text { font-family: 'Inter', sans-serif; }
    .logo-top { font-size: 14px; font-weight: 700; color: #fff; letter-spacing: 0.08em; text-transform: uppercase; line-height: 1.1; }
    .logo-sub { font-size: 9px; font-weight: 500; color: var(--gold); letter-spacing: 0.18em; text-transform: uppercase; }
    .hero {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 80px 24px;
      text-align: center;
    }
    .hero-inner { max-width: 520px; }
    .code {
      font-size: 96px;
      font-weight: 700;
      font-family: 'Playfair Display', serif;
      color: var(--navy);
      line-height: 1;
      margin-bottom: 16px;
    }
    .code span { color: var(--gold); }
    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 28px;
      font-weight: 700;
      color: var(--text-dark);
      margin-bottom: 12px;
    }
    p {
      font-size: 16px;
      color: var(--text-mid);
      line-height: 1.7;
      margin-bottom: 36px;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--navy);
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      padding: 13px 28px;
      border-radius: 9px;
      text-decoration: none;
      transition: background 0.18s;
      margin: 0 6px 12px;
    }
    .btn:hover { background: #1e3a5f; }
    .btn-gold { background: var(--gold); }
    .btn-gold:hover { background: #d4aa3e; }
  </style>
</head>
<body>
  <nav class="nav">
    <a href="/" class="logo">
      <svg width="32" height="36" viewBox="0 0 120 136" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M18 4 L102 4 L116 18 L116 76 Q116 118 60 133 Q4 118 4 76 L4 18 Z" fill="rgba(255,255,255,0.12)" stroke="rgba(196,154,46,0.6)" stroke-width="2"/>
        <polyline points="16,85 60,44 104,85" stroke="white" stroke-width="13" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        <rect x="68" y="30" width="13" height="22" rx="1.5" fill="white"/>
      </svg>
      <div class="logo-text">
        <div class="logo-top">Colorado</div>
        <div class="logo-sub">Home Protection</div>
      </div>
    </a>
  </nav>

  <div class="hero">
    <div class="hero-inner">
      <div class="code">4<span>0</span>4</div>
      <h1>Page not found</h1>
      <p>The article or page you're looking for has moved or doesn't exist. Head back to the blog to find what you need.</p>
      <div>
        <a href="/" class="btn">← Back to Blog</a>
        <a href="https://coloradohomeprotection.net" class="btn btn-gold">Get Free Quote</a>
      </div>
    </div>
  </div>
</body>
</html>
