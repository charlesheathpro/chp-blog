    <path d="M18 4 L102 4 L116 18 L116 76 Q116 118 60 133 Q4 118 4 76 L4 18 Z" fill="#c49a2e"/>
    <polyline points="16,85 60,44 104,85" stroke="white" stroke-width="13" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <rect x="68" y="30" width="13" height="22" rx="1.5" fill="white"/>
  </g>

  <!-- Decorative rings -->
  <circle cx="1050" cy="315" r="185" fill="none" stroke="#c49a2e" stroke-width="1" opacity="0.09"/>
  <circle cx="1050" cy="315" r="122" fill="none" stroke="#c49a2e" stroke-width="1" opacity="0.06"/>

  <!-- Brand pill badge -->
  <rect x="40" y="52" width="234" height="28" rx="14" fill="rgba(196,154,46,0.12)" stroke="rgba(196,154,46,0.28)" stroke-width="1"/>
  <text x="157" y="71" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="700" letter-spacing="2.5" fill="#c49a2e" text-anchor="middle">COLORADO HOMEOWNER BLOG</text>

  <!-- Main headline -->
  <text x="40" y="218" font-family="Georgia, 'Times New Roman', serif" font-size="74" font-weight="700" fill="#ffffff">Protect What</text>
  <text x="40" y="308" font-family="Georgia, 'Times New Roman', serif" font-size="74" font-weight="700" font-style="italic" fill="#c49a2e">Matters Most</text>
  <text x="40" y="398" font-family="Georgia, 'Times New Roman', serif" font-size="74" font-weight="700" fill="#ffffff">for Your Family</text>

  <!-- Gold divider -->
  <rect x="40" y="428" width="64" height="3" rx="1.5" fill="#c49a2e"/>

  <!-- Tagline -->
  <text x="40" y="478" font-family="Arial, Helvetica, sans-serif" font-size="22" fill="rgba(255,255,255,0.50)">Free guides on Colorado mortgage protection</text>
  <text x="40" y="508" font-family="Arial, Helvetica, sans-serif" font-size="22" fill="rgba(255,255,255,0.50)">&amp; life insurance — no jargon, no pressure.</text>

